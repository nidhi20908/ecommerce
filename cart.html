<meta charset="UTF-8">

<title>LUMÉ — Your Cart</title>
<link rel="stylesheet" href="styles.css">
<style>
/* ── CART PAGE STYLES ── */
.cart-layout {
  display: grid;
  grid-template-columns: 1fr 360px;
  gap: 32px;
  padding: 40px 48px 80px;
  max-width: 1200px;
  margin: 0 auto;
}

/* Empty state */
.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 100px 40px;
}
.empty-state .empty-icon { font-size: 5rem; margin-bottom: 20px; opacity: .5; }
.empty-state h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2rem; font-weight: 700; color: var(--teal); margin-bottom: 10px;
}
.empty-state p { color: var(--muted); margin-bottom: 28px; }
.empty-state .btn-teal { max-width: 200px; margin: 0 auto; }

/* Cart items */
.cart-items-col h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.5rem; font-weight: 700; color: var(--teal);
  margin-bottom: 20px;
}
.cart-item {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 18px 20px;
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 14px; transition: box-shadow .2s;
}
.cart-item:hover { box-shadow: var(--shadow); }
.item-emoji {
  width: 66px; height: 66px; border-radius: 12px;
  background: var(--bg2); display: flex; align-items: center;
  justify-content: center; font-size: 2.2rem; flex-shrink: 0;
}
.item-info { flex: 1; }
.item-name { font-weight: 600; font-size: .96rem; margin-bottom: 3px; }
.item-sub  { color: var(--muted); font-size: .8rem; }
.item-unit { color: var(--muted); font-size: .78rem; margin-top: 4px; }
.qty-controls {
  display: flex; align-items: center; gap: 10px;
}
.qty-btn {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--bg2); border: 1px solid var(--border);
  cursor: pointer; font-size: 1rem; color: var(--teal);
  display: flex; align-items: center; justify-content: center;
  transition: background .15s, border-color .15s; font-family: 'Outfit', sans-serif;
}
.qty-btn:hover { background: var(--teal); color: var(--bg); border-color: var(--teal); }
.qty-val { font-weight: 700; font-size: .95rem; min-width: 24px; text-align: center; }
.item-price {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.25rem; font-weight: 700; color: var(--teal);
  min-width: 72px; text-align: right;
}
.remove-btn {
  background: none; border: none; cursor: pointer;
  color: #c5bdb0; font-size: 1rem; padding: 4px;
  transition: color .2s;
}
.remove-btn:hover { color: var(--danger); }

/* Free shipping banner */
.free-shipping-bar {
  background: var(--teal); color: var(--bg);
  border-radius: 10px; padding: 12px 18px;
  font-size: .84rem; margin-bottom: 20px;
  display: flex; align-items: center; gap: 8px;
}
.shipping-progress {
  flex: 1; background: rgba(245,240,232,.2);
  border-radius: 50px; height: 6px; overflow: hidden;
}
.shipping-fill {
  background: var(--coral); height: 100%;
  border-radius: 50px; transition: width .4s ease;
}

/* Sticky summary panel */
.summary-col { position: relative; }
.summary-sticky { position: sticky; top: 90px; }
.summary-box { margin-bottom: 14px; }
.summary-items-list {
  margin-bottom: 16px;
  max-height: 200px; overflow-y: auto;
}
.mini-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0; border-bottom: 1px solid var(--bg2); font-size: .84rem;
}
.mini-item:last-child { border-bottom: none; }
.mini-emoji { font-size: 1.2rem; width: 32px; text-align: center; }
.mini-name { flex: 1; font-weight: 500; }
.mini-qty  { color: var(--muted); font-size: .78rem; }
.mini-price{ font-weight: 600; color: var(--teal); }
.divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
.btn-gap { margin-top: 12px; }
.secure-note {
  text-align: center; color: var(--muted); font-size: .75rem; margin-top: 12px;
}

@media(max-width: 900px) {
  .cart-layout { grid-template-columns: 1fr; padding: 24px 20px 60px; }
  .summary-sticky { position: static; }
}
</style>

<nav>
  <a class="nav-logo" href="index.html">Lum<span>é</span></a>
  <div class="nav-links">
    <a class="nav-link" href="index.html">Shop</a>
    <a class="nav-link active" href="cart.html">Cart</a>
    <a class="nav-link" href="checkout.html">Checkout</a>
  </div>
  <a class="cart-btn" href="cart.html">
    🛒 Cart <span class="cart-badge">0</span>
  </a>
</nav>

<!-- PAGE HEADER -->
<div class="page-header">
  <h1>Your Cart</h1>
  <p id="header-sub">Loading your items…</p>
</div>

<!-- LAYOUT -->
<div class="cart-layout" id="cart-layout"></div>

<!-- TOAST -->
<div class="toast" id="toast">
  <div class="toast-icon" id="toast-icon">✓</div>
  <div>
    <div class="toast-t1" id="toast-t1"></div>
    <div class="toast-t2" id="toast-t2"></div>
  </div>
</div>

<script src="cart.js"></script>
<script>
function render() {
  const cart = getCart();
  const layout = document.getElementById('cart-layout');

  if (cart.length === 0) {
    document.getElementById('header-sub').textContent = 'Nothing here yet';
    layout.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🛒</div>
        <h2>Your cart is empty</h2>
        <p>Head back to the shop and discover something beautiful.</p>
        <a class="btn-teal" href="index.html">Browse Collection</a>
      </div>`;
    return;
  }

  const subtotal = cartTotal();
  const shipping = calcShipping(subtotal);
  const tax      = calcTax(subtotal);
  const grand    = subtotal + shipping + tax;
  const toFree   = Math.max(0, 500 - subtotal);
  const pct      = Math.min(100, (subtotal / 500) * 100);

  document.getElementById('header-sub').textContent = cart.length + ' item' + (cart.length !== 1 ? 's' : '') + ' in your cart';

  layout.innerHTML = `
    <div class="cart-items-col">
      <h2>Items (${cart.length})</h2>
      ${toFree > 0
        ? `<div class="free-shipping-bar">
            🚚 <span>Add <strong>₹${toFree}</strong> more for free shipping</span>
            <div class="shipping-progress"><div class="shipping-fill" style="width:${pct}%"></div></div>
           </div>`
        : `<div class="free-shipping-bar" style="background:var(--success)">🎉 You've unlocked free shipping!</div>`
      }
      ${cart.map(item => `
        <div class="cart-item" id="row-${item.id}">
          <div class="item-emoji">${item.emoji}</div>
          <div class="item-info">
            <div class="item-name">${item.name}</div>
            <div class="item-sub">${item.sub}</div>
            <div class="item-unit">₹${item.price} each</div>
          </div>
          <div class="qty-controls">
            <button class="qty-btn" onclick="update(${item.id}, -1)">−</button>
            <span class="qty-val">${item.qty}</span>
            <button class="qty-btn" onclick="update(${item.id}, +1)">+</button>
          </div>
          <div class="item-price">₹${item.price * item.qty}</div>
          <button class="remove-btn" title="Remove" onclick="del(${item.id})">✕</button>
        </div>
      `).join('')}
    </div>

    <div class="summary-col">
      <div class="summary-sticky">
        <div class="summary-box">
          <h3>Order Summary</h3>
          <div class="summary-items-list">
            ${cart.map(item => `
              <div class="mini-item">
                <div class="mini-emoji">${item.emoji}</div>
                <div class="mini-name">${item.name}</div>
                <div class="mini-qty">×${item.qty}</div>
                <div class="mini-price">₹${item.price * item.qty}</div>
              </div>
            `).join('')}
          </div>
          <hr class="divider">
          <div class="summary-row"><span>Subtotal</span><span>₹${subtotal}</span></div>
          <div class="summary-row">
            <span>Shipping</span>
            <span>${shipping === 0 ? '<span class="free-tag">Free ✓</span>' : '₹' + shipping}</span>
          </div>
          <div class="summary-row"><span>GST (18%)</span><span>₹${tax}</span></div>
          <div class="summary-row total"><span>Total</span><span class="val">₹${grand}</span></div>
        </div>
        <a class="btn-primary" href="checkout.html">Proceed to Checkout →</a>
        <div class="btn-gap">
          <a class="btn-ghost" href="index.html">← Continue Shopping</a>
        </div>
        <p class="secure-note">🔒 Secure checkout · SSL encrypted</p>
      </div>
    </div>
  `;
}

function update(id, delta) {
  changeQty(id, delta);
  showToast(delta > 0 ? '➕' : '➖', 'Quantity updated', '');
  render();
}

function del(id) {
  const item = getCart().find(i => i.id === id);
  removeItem(id);
  if (item) showToast('🗑️', item.name + ' removed', '');
  render();
}

render();
</script>
</body>
</html>
