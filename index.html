<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUMÉ — Shop</title>
<link rel="stylesheet" href="styles.css">
<style>
/* ── SHOP-SPECIFIC STYLES ── */
.hero {
  background: var(--teal);
  padding: 72px 48px 64px;
  display: grid; grid-template-columns: 1fr auto; gap: 40px; align-items: center;
  position: relative; overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute; right: -80px; top: -80px;
  width: 400px; height: 400px; border-radius: 50%;
  background: radial-gradient(circle, rgba(232,93,58,.18), transparent 70%);
  pointer-events: none;
}
.hero-left h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2.8rem, 6vw, 5.5rem); font-weight: 700; line-height: .95;
  color: var(--bg);
}
.hero-left h1 em { color: var(--coral); font-style: italic; }
.hero-left p {
  color: rgba(245,240,232,.6); font-size: 1rem; line-height: 1.75;
  margin-top: 18px; max-width: 420px;
}
.hero-left .hero-cta {
  margin-top: 28px; display: inline-block;
  background: var(--coral); color: #fff;
  padding: 12px 28px; border-radius: 50px;
  font-weight: 600; font-size: .88rem; letter-spacing: .06em;
  text-decoration: none; transition: background .2s;
}
.hero-left .hero-cta:hover { background: var(--coral2); }
.hero-right { text-align: right; }
.hero-stat .num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 6rem; font-weight: 700; line-height: 1;
  color: var(--coral);
}
.hero-stat .lbl { color: rgba(245,240,232,.5); font-size: .78rem; letter-spacing: .14em; text-transform: uppercase; }

/* ── FILTERS ── */
.toolbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 28px 48px 20px; gap: 16px; flex-wrap: wrap;
}
.toolbar-left { display: flex; gap: 10px; flex-wrap: wrap; }
.filter-chip {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 50px; padding: 7px 18px;
  font-size: .82rem; font-weight: 500; cursor: pointer;
  transition: all .2s; color: var(--muted);
}
.filter-chip:hover, .filter-chip.active {
  background: var(--teal); color: var(--bg); border-color: var(--teal);
}
.toolbar-right { color: var(--muted); font-size: .85rem; }

/* ── GRID ── */
.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 24px; padding: 0 48px 72px;
}
.product-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden; cursor: pointer;
  transition: transform .28s, box-shadow .28s;
  position: relative;
}
.product-card:hover {
  transform: translateY(-7px);
  box-shadow: var(--shadow-lg);
}
.card-img {
  height: 210px; display: flex; align-items: center; justify-content: center;
  font-size: 4.5rem; background: var(--bg2); position: relative;
}
.card-img::after {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at 70% 30%, rgba(232,93,58,.07), transparent 60%);
}
.card-tag {
  position: absolute; top: 12px; left: 12px; z-index: 1;
  background: var(--coral); color: #fff;
  font-size: .68rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  padding: 4px 11px; border-radius: 20px;
}
.card-tag.hot  { background: var(--teal); }
.card-tag.sale { background: #b04a00; }
.card-body { padding: 18px 20px 20px; }
.card-name { font-weight: 600; font-size: .98rem; margin-bottom: 3px; }
.card-sub  { color: var(--muted); font-size: .82rem; margin-bottom: 14px; }
.card-footer { display: flex; align-items: center; justify-content: space-between; }
.card-price {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.4rem; font-weight: 700; color: var(--teal);
}
.add-btn {
  background: var(--teal); color: var(--bg);
  border: none; border-radius: 50px; padding: 8px 20px;
  font-size: .8rem; font-weight: 600; cursor: pointer;
  font-family: 'Outfit', sans-serif; letter-spacing: .04em;
  transition: background .2s, transform .15s;
}
.add-btn:hover    { background: var(--teal2); }
.add-btn.added    { background: var(--success); }
.add-btn:active   { transform: scale(.95); }

@media(max-width: 768px) {
  .hero { grid-template-columns: 1fr; padding: 40px 20px; }
  .hero-right { display: none; }
  .toolbar, .products-grid { padding-left: 20px; padding-right: 20px; }
}
</style>
</head>
<body>
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-M8DS264T"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->

<!-- NAV -->
<nav>
  <a class="nav-logo" href="index.html">Lum<span>é</span></a>
  <div class="nav-links">
    <a class="nav-link active" href="index.html">Shop</a>
    <a class="nav-link" href="cart.html">Cart</a>
    <a class="nav-link" href="checkout.html">Checkout</a>
  </div>
  <a class="cart-btn" href="cart.html">
    🛒 Cart <span class="cart-badge">0</span>
  </a>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-left">
    <h1>Curated<br><em>Living,</em><br>Delivered.</h1>
    <p>Objects worth owning. Each piece selected for craft, material, and lasting beauty. No fast fashion. No compromises.</p>
    <a class="hero-cta" href="#products">Browse Collection ↓</a>
  </div>
  <div class="hero-right">
    <div class="hero-stat">
      <div class="num">12</div>
      <div class="lbl">New Arrivals</div>
    </div>
  </div>
</section>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="toolbar-left">
    <button class="filter-chip active" onclick="filterProducts('all', this)">All Items</button>
    <button class="filter-chip" onclick="filterProducts('new', this)">New</button>
    <button class="filter-chip" onclick="filterProducts('hot', this)">Hot</button>
    <button class="filter-chip" onclick="filterProducts('sale', this)">Sale</button>
  </div>
  <div class="toolbar-right" id="count-label">12 products</div>
</div>

<!-- PRODUCTS -->
<div class="products-grid" id="products-grid"></div>

<!-- TOAST -->
<div class="toast" id="toast">
  <div class="toast-icon" id="toast-icon">🛒</div>
  <div>
    <div class="toast-t1" id="toast-t1">Added!</div>
    <div class="toast-t2" id="toast-t2"></div>
  </div>
</div>

<script src="cart.js"></script>
<script>
let currentFilter = 'all';

function renderProducts(filter) {
  const filtered = filter === 'all'
    ? PRODUCTS
    : PRODUCTS.filter(p => p.tag && p.tag.toLowerCase() === filter);
  document.getElementById('count-label').textContent = filtered.length + ' product' + (filtered.length !== 1 ? 's' : '');
  document.getElementById('products-grid').innerHTML = filtered.map(p => `
    <div class="product-card" onclick="handleAdd(${p.id})">
      <div class="card-img">
        ${p.tag ? `<div class="card-tag ${p.tag.toLowerCase()}">${p.tag}</div>` : ''}
        ${p.emoji}
      </div>
      <div class="card-body">
        <div class="card-name">${p.name}</div>
        <div class="card-sub">${p.sub}</div>
        <div class="card-footer">
          <div class="card-price">₹${p.price}</div>
          <button class="add-btn" id="btn-${p.id}" onclick="event.stopPropagation(); handleAdd(${p.id})">Add to Cart</button>
        </div>
      </div>
    </div>
  `).join('');
}

function handleAdd(id) {
  const product = addToCart(id);
  showToast('🛒', product.name + ' added!', '₹' + product.price + '  ·  View Cart →');
  const btn = document.getElementById('btn-' + id);
  if (btn) {
    btn.classList.add('added');
    btn.textContent = '✓ Added';
    setTimeout(() => { btn.classList.remove('added'); btn.textContent = 'Add to Cart'; }, 1600);
  }
}

function filterProducts(tag, el) {
  currentFilter = tag;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderProducts(tag);
}

renderProducts('all');
</script>
</body>
</html>
