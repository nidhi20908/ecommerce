<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUMÉ — Order Confirmed!</title>
<link rel="stylesheet" href="styles.css">
<style>
/* ── SUCCESS PAGE STYLES ── */
.success-wrapper {
  min-height: calc(100vh - 68px);
  display: flex; align-items: center; justify-content: center;
  padding: 60px 20px;
  background: var(--bg);
}

.success-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 56px 48px;
  max-width: 680px;
  width: 100%;
  text-align: center;
  box-shadow: var(--shadow-lg);
  animation: slideUp .6s cubic-bezier(.17,.67,.35,1.1);
}
@keyframes slideUp {
  from { opacity:0; transform: translateY(30px) scale(.97); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}

.confetti-icon {
  font-size: 5rem;
  display: block;
  margin-bottom: 20px;
  animation: pop .7s cubic-bezier(.17,.67,.48,1.6);
}
@keyframes pop {
  from { transform: scale(0) rotate(-20deg); }
  to   { transform: scale(1) rotate(0deg); }
}

.success-card h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 3rem; font-weight: 700; line-height: 1.05;
  color: var(--teal); margin-bottom: 10px;
}
.success-card h1 span { color: var(--coral); font-style: italic; }
.success-card .sub {
  color: var(--muted); font-size: .98rem; line-height: 1.7;
  margin-bottom: 32px; max-width: 460px; margin-left: auto; margin-right: auto;
}

/* Order ID pill */
.order-pill {
  display: inline-flex; align-items: center; gap: 12px;
  background: var(--teal); color: var(--bg);
  border-radius: 50px; padding: 12px 24px; margin-bottom: 36px;
}
.order-pill .label { font-size: .72rem; letter-spacing: .12em; text-transform: uppercase; opacity: .65; }
.order-pill .value {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.5rem; font-weight: 700; letter-spacing: .04em;
}

/* Customer info box */
.info-box {
  background: var(--bg2); border-radius: 14px; padding: 20px 24px;
  margin-bottom: 32px; text-align: left;
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
}
.info-field { }
.info-label { font-size: .7rem; font-weight: 700; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 4px; }
.info-val   { font-size: .9rem; font-weight: 600; color: var(--teal); }

/* Order items */
.order-items-list {
  background: var(--bg2); border-radius: 14px; padding: 16px 20px;
  margin-bottom: 32px; text-align: left;
}
.order-items-list h3 {
  font-size: .72rem; font-weight: 700; color: var(--muted); letter-spacing: .12em;
  text-transform: uppercase; margin-bottom: 12px;
}
.oi-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .86rem;
}
.oi-row:last-child { border-bottom: none; }
.oi-emoji { font-size: 1.3rem; }
.oi-name  { flex:1; font-weight: 600; }
.oi-qty   { color: var(--muted); font-size: .78rem; }
.oi-price { font-weight: 700; color: var(--teal); }
.oi-total {
  display: flex; justify-content: space-between; align-items: center;
  padding-top: 12px; font-weight: 700;
}
.oi-total span:last-child {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.4rem; color: var(--teal);
}

/* Timeline */
.timeline {
  display: flex; align-items: flex-start; justify-content: center;
  gap: 0; margin-bottom: 36px;
}
.tl-step { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; }
.tl-dot {
  width: 44px; height: 44px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; font-size: 1.3rem;
  position: relative; z-index: 1;
}
.tl-step.done  .tl-dot { background: var(--success); }
.tl-step.next  .tl-dot { background: var(--coral); }
.tl-step.later .tl-dot { background: var(--bg2); border: 2px solid var(--border); }
.tl-line {
  flex: 1; height: 2px; margin-top: 22px; background: var(--border); align-self: flex-start;
}
.tl-line.done { background: var(--success); }
.tl-label { font-size: .72rem; font-weight: 600; color: var(--muted); text-align: center; max-width: 80px; line-height: 1.4; }
.tl-step.done  .tl-label { color: var(--success); }
.tl-step.next  .tl-label { color: var(--coral); }

/* Buttons */
.btn-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
.btn-row .btn-teal  { max-width: 220px; }
.btn-row .btn-ghost { max-width: 200px; }

/* Fallback if no order data */
.no-order { color: var(--muted); padding: 40px 0; }

@media(max-width:640px) {
  .success-card { padding: 36px 24px; }
  .success-card h1 { font-size: 2.2rem; }
  .info-box { grid-template-columns: 1fr; }
  .timeline { gap: 0; }
  .tl-label { display: none; }
}
</style>
</head>
<body>
  <!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-M8DS264T"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->

<!-- NAV -->
<nav>
  <a class="nav-logo" href="index.html">Lum<span>é</span></a>
  <div class="nav-links">
    <a class="nav-link" href="index.html">Shop</a>
    <a class="nav-link" href="cart.html">Cart</a>
    <a class="nav-link" href="checkout.html">Checkout</a>
  </div>
  <a class="cart-btn" href="cart.html">
    🛒 Cart <span class="cart-badge">0</span>
  </a>
</nav>

<!-- STEPS (all done) -->
<div class="steps-bar">
  <div class="step-item done">
    <div class="step-num">✓</div>
    <div class="step-label">Cart</div>
  </div>
  <div class="step-connector done"></div>
  <div class="step-item done">
    <div class="step-num">✓</div>
    <div class="step-label">Details</div>
  </div>
  <div class="step-connector done"></div>
  <div class="step-item active">
    <div class="step-num">✓</div>
    <div class="step-label">Confirmed</div>
  </div>
</div>

<!-- SUCCESS CARD -->
<div class="success-wrapper">
  <div class="success-card" id="success-card">
    <span class="confetti-icon">🎉</span>
    <h1>Order <span>Confirmed!</span></h1>
    <p class="sub" id="success-sub">Loading your order details…</p>

    <div class="order-pill" id="order-pill">
      <div>
        <div class="label">Order Number</div>
        <div class="value" id="order-id">LME-000000</div>
      </div>
    </div>

    <!-- Info grid -->
    <div class="info-box" id="info-box"></div>

    <!-- Items list -->
    <div class="order-items-list" id="items-list"></div>

    <!-- Timeline -->
    <div class="timeline">
      <div class="tl-step done">
        <div class="tl-dot">✓</div>
        <div class="tl-label">Order Placed</div>
      </div>
      <div class="tl-line done"></div>
      <div class="tl-step next">
        <div class="tl-dot">📦</div>
        <div class="tl-label">Packing Now</div>
      </div>
      <div class="tl-line"></div>
      <div class="tl-step later">
        <div class="tl-dot">🚚</div>
        <div class="tl-label">Shipped (1–2 days)</div>
      </div>
      <div class="tl-line"></div>
      <div class="tl-step later">
        <div class="tl-dot">🏠</div>
        <div class="tl-label">Delivered (3–5 days)</div>
      </div>
    </div>

    <div class="btn-row">
      <a class="btn-teal" href="index.html">Continue Shopping</a>
      <button class="btn-ghost" onclick="window.print()">🖨 Print Receipt</button>
    </div>
  </div>
</div>

<script src="cart.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  let order = null;
  try { order = JSON.parse(sessionStorage.getItem('lume_order')); } catch {}

  if (!order) {
    document.getElementById('success-sub').textContent = 'No order found. Start shopping!';
    document.getElementById('info-box').innerHTML = '<p class="no-order">No recent order data.</p>';
    document.getElementById('items-list').innerHTML = '';
    return;
  }

  /* Header */
  document.getElementById('success-sub').textContent =
    `Thank you, ${order.name.split(' ')[0]}! Your order has been received and is being prepared with care.`;
  document.getElementById('order-id').textContent = order.orderId;

  /* Info grid */
  document.getElementById('info-box').innerHTML = `
    <div class="info-field">
      <div class="info-label">Customer</div>
      <div class="info-val">${order.name}</div>
    </div>
    <div class="info-field">
      <div class="info-label">Email</div>
      <div class="info-val">${order.email}</div>
    </div>
    <div class="info-field">
      <div class="info-label">Ship To</div>
      <div class="info-val">${order.city}, India</div>
    </div>
    <div class="info-field">
      <div class="info-label">Order Total</div>
      <div class="info-val" style="color:var(--coral);font-size:1.1rem">₹${order.grand}</div>
    </div>
  `;

  /* Items */
  const items = order.items || [];
  document.getElementById('items-list').innerHTML = `
    <h3>Items Ordered</h3>
    ${items.map(i => `
      <div class="oi-row">
        <div class="oi-emoji">${i.emoji}</div>
        <div class="oi-name">${i.name}</div>
        <div class="oi-qty">×${i.qty}</div>
        <div class="oi-price">₹${i.price * i.qty}</div>
      </div>
    `).join('')}
    <div class="oi-total">
      <span>Total Paid</span>
      <span>₹${order.grand}</span>
    </div>
  `;

  /* Clear session so user can't revisit stale data */
  sessionStorage.removeItem('lume_order');
});
</script>
</body>
</html>
